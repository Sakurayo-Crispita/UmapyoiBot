<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        html:not(.theme-ready) body { opacity: 0; visibility: hidden; }
    </style>
    <!-- Anti-flash: apply user theme before first paint -->
    <script>!function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.classList.add('theme-ready')}()</script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad - UmapyoiBot</title>
    <link rel="icon" type="image/png" href="/static/assets/favicon_web.png">
    
    <!-- Branding Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Outfit:wght@400;600;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* Light Theme Tokens (Mocha/Caramel) */
            --bg-main: #ffffff;
            --bg-alt: #fdfafb;
            --p-accent: #d4a373; /* Caramel */
            --accent-glow: rgba(212, 163, 115, 0.3);
            --text-main: #1a1a1a;
            --text-muted: #5f5f5f;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(212, 163, 115, 0.2);
            --blob-color: rgba(245, 130, 174, 0.05);
        }

        [data-theme="dark"] {
            /* Dark Theme Tokens (Deep Espresso) */
            --bg-main: #151312;
            --bg-alt: #1e1b1a;
            --p-accent: #d4a373;
            --accent-glow: rgba(212, 163, 115, 0.25);
            --text-main: #f8f8f8;
            --text-muted: #a69c97;
            --glass-bg: rgba(30, 27, 26, 0.7);
            --glass-border: rgba(212, 163, 115, 0.15);
            --blob-color: rgba(212, 163, 115, 0.08);
        }

        @keyframes blobBounce {
            0%, 100% { transform: translate(0, 0) scale(1.1); }
            50% { transform: translate(30px, -30px) scale(1.3); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.4s ease;
        }

        /* Ambient background decoration */
        .bg-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--blob-color) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            animation: blobBounce 12s infinite alternate;
        }
        .bg-glow-1 { top: -200px; left: -100px; }
        .bg-glow-2 { bottom: -200px; right: -100px; opacity: 0.6; }

        .container {
            text-align: center;
            padding: 60px 45px;
            max-width: 580px;
            width: 90%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.15);
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        [data-theme="dark"] .container {
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6);
        }

        .shield-icon {
            width: 85px;
            height: 85px;
            background: var(--bg-alt);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--p-accent);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
            transform: rotate(-5deg);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.6rem;
            font-weight: 850;
            margin: 0 0 15px 0;
            letter-spacing: -2px;
            color: var(--text-main);
        }

        .message {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* Countdown Visual - FIX: Increased size to prevent clipping */
        .timer-wrapper {
            position: relative;
            width: 190px;
            height: 190px;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            position: absolute;
            top: 5px;
            left: 5px;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            stroke-dasharray: 440; /* 2 * PI * 70 */
            stroke-dashoffset: 0;
            stroke: var(--p-accent);
            stroke-width: 12;
            fill: transparent;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .progress-ring__bg {
            stroke: var(--glass-border);
            stroke-width: 12;
            fill: transparent;
            opacity: 0.3;
        }

        .timer-text {
            position: relative;
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem;
            font-weight: 850;
            color: var(--p-accent);
            z-index: 2;
        }

        .countdown-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        #refresh-status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--p-accent);
            font-weight: 700;
            display: none;
            animation: fadeInDown 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="container">
        <div class="shield-icon">
            <i data-lucide="shield-alert" style="width: 48px; height: 48px;"></i>
        </div>
        <h1>¡Wow, vas muy rápido!</h1>
        <p class="message">
            Se te ha bloqueado temporalmente por temas de seguridad.
        </p>

        <div class="timer-wrapper">
            <svg class="progress-ring" width="180" height="180">
                <circle class="progress-ring__bg" stroke-width="12" r="70" cx="90" cy="90" />
                <circle class="progress-ring__circle" id="timer-circle" r="70" cx="90" cy="90" />
            </svg>
            <div class="timer-text" id="seconds">5s</div>
        </div>

        <span class="countdown-label" id="status-label">Modo Seguridad</span>
        
        <div id="refresh-status">Sincronizando...</div>
    </div>

    <script>
        lucide.createIcons();

        // Obtener segundos restantes desde el servidor
        let timeLeft = parseInt("{{ remaining | default(5) }}") || 5;
        const totalTime = 5; 
        const secondsEl = document.getElementById('seconds');
        const circle = document.getElementById('timer-circle');
        const statusLabel = document.getElementById('status-label');
        const refreshStatus = document.getElementById('refresh-status');
        
        const circumference = 2 * Math.PI * 70;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                secondsEl.innerText = "0s";
                setProgress(0);
                statusLabel.innerText = "¡Listo!";
                refreshStatus.style.display = "block";
                
                setTimeout(() => {
                    window.location.reload(); 
                }, 800);
                return;
            }

            secondsEl.innerText = timeLeft + "s";
            const percent = (timeLeft / totalTime) * 100;
            setProgress(percent);
            
            timeLeft--;
            setTimeout(updateTimer, 1000);
        }

        updateTimer();
    </script>
</body>
</html>
