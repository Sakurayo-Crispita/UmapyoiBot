<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad - UmapyoiBot</title>
    <link rel="icon" type="image/png" href="/static/assets/favicon_web.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #151312; /* Deep Espresso */
            --p-gold: #d4a373; /* Umapyoi Caramel */
            --p-gold-glow: rgba(212, 163, 115, 0.3);
            --p-gold-soft: rgba(212, 163, 115, 0.1);
            --text-main: #f8f8f8;
            --text-muted: #a69c97;
            --glass-bg: rgba(30, 27, 26, 0.6);
            --glass-border: rgba(212, 163, 115, 0.15);
        }

        @keyframes blobBounce {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--p-gold-soft) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            animation: blobBounce 12s infinite alternate;
        }
        .bg-glow-top { top: -250px; left: -100px; }
        .bg-glow-bottom { bottom: -250px; right: -100px; opacity: 0.6; }

        .container {
            text-align: center;
            padding: 60px 45px;
            max-width: 550px;
            width: 90%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            background: var(--p-gold-soft);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--p-gold);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--p-gold-glow));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #fff 40%, var(--p-gold) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Countdown Visual - FIX: Increased size to prevent clipping */
        .timer-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            stroke-dasharray: 440; /* 2 * PI * 70 */
            stroke-dashoffset: 0;
            stroke: var(--p-gold);
            stroke-width: 10;
            fill: transparent;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--p-gold-glow));
        }

        .progress-ring__bg {
            stroke: rgba(255, 255, 255, 0.03);
            stroke-width: 10;
            fill: transparent;
        }

        .timer-text {
            position: relative;
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--p-gold);
            z-index: 2;
            text-shadow: 0 0 20px var(--p-gold-glow);
        }

        .countdown-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
            opacity: 0.8;
        }

        #refresh-status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--p-gold);
            letter-spacing: 1px;
            font-weight: 700;
            display: none;
            animation: fadeInDown 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-top"></div>
    <div class="bg-glow bg-glow-bottom"></div>

    <div class="container">
        <div class="shield-icon">
            <i data-lucide="shield-alert" style="width: 45px; height: 45px;"></i>
        </div>
        <h1>¡Wow, vas muy rápido!</h1>
        <p class="message">
            Se te ha bloqueado temporalmente por temas de seguridad.
        </p>

        <div class="timer-wrapper">
            <svg class="progress-ring" width="180" height="180">
                <circle class="progress-ring__bg" stroke-width="10" r="70" cx="90" cy="90" />
                <circle class="progress-ring__circle" id="timer-circle" r="70" cx="90" cy="90" />
            </svg>
            <div class="timer-text" id="seconds">5s</div>
        </div>

        <span class="countdown-label" id="status-label">Tiempo de espera</span>
        
        <div id="refresh-status">Sincronizando con el servidor...</div>
    </div>

    <script>
        lucide.createIcons();

        let timeLeft = parseInt("{{ remaining | default(5) }}") || 5;
        const totalTime = 5; 
        const secondsEl = document.getElementById('seconds');
        const circle = document.getElementById('timer-circle');
        const statusLabel = document.getElementById('status-label');
        const refreshStatus = document.getElementById('refresh-status');
        
        const circumference = 2 * Math.PI * 70;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                secondsEl.innerText = "0s";
                setProgress(0);
                statusLabel.innerText = "¡Hecho!";
                refreshStatus.style.display = "block";
                
                setTimeout(() => {
                    window.location.reload(); 
                }, 800);
                return;
            }

            secondsEl.innerText = timeLeft + "s";
            const percent = (timeLeft / totalTime) * 100;
            setProgress(percent);
            
            timeLeft--;
            setTimeout(updateTimer, 1000);
        }

        updateTimer();
    </script>
</body>
</html>
