<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad - UmapyoiBot</title>
    <link rel="icon" type="image/png" href="/static/assets/favicon_web.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0a0c;
            /* Umapyoi Pink Palette */
            --p-pink: #f582ae;
            --p-pink-glow: rgba(245, 130, 174, 0.4);
            --p-pink-soft: rgba(245, 130, 174, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        @keyframes blobBounce {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background decoration */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--p-pink-soft) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: blobBounce 10s infinite alternate;
        }
        .bg-glow-top { top: -200px; left: -100px; }
        .bg-glow-bottom { bottom: -200px; right: -100px; background: radial-gradient(circle, rgba(138, 43, 226, 0.08) 0%, transparent 70%); }

        .container {
            text-align: center;
            padding: 50px 40px;
            max-width: 550px;
            width: 90%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .shield-icon {
            font-size: 3rem;
            color: var(--p-pink);
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 15px var(--p-pink-glow));
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, var(--p-pink) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* Countdown Visual */
        .timer-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            stroke-dasharray: 440; /* 2 * PI * 70 */
            stroke-dashoffset: 0;
            stroke: var(--p-pink);
            stroke-width: 8;
            fill: transparent;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px var(--p-pink-glow));
        }

        .progress-ring__bg {
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
            fill: transparent;
        }

        .timer-text {
            position: absolute;
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--p-pink);
        }

        .countdown-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .action-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--p-pink);
        }

        #refresh-status {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--p-pink);
            opacity: 0.8;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-top"></div>
    <div class="bg-glow bg-glow-bottom"></div>

    <div class="container">
        <div class="shield-icon">
            <i data-lucide="shield-alert" style="width: 60px; height: 60px;"></i>
        </div>
        <h1>¡Wow, vas muy rápido!</h1>
        <p class="message">
            Se te ha bloqueado temporalmente por temas de seguridad.
        </p>

        <div class="timer-wrapper">
            <svg class="progress-ring" width="160" height="160">
                <circle class="progress-ring__bg" stroke-width="8" r="70" cx="80" cy="80" />
                <circle class="progress-ring__circle" id="timer-circle" r="70" cx="80" cy="80" />
            </svg>
            <div class="timer-text" id="seconds">5s</div>
        </div>

        <span class="countdown-label" id="status-label">Esperando permiso...</span>
        
        <div id="refresh-status">Actualizando ahora mismo...</div>
    </div>

    <script>
        lucide.createIcons();

        // Obtener segundos restantes desde el servidor (inyectado por Jinja)
        // Usamos string para que el editor no marque error de sintaxis
        let timeLeft = parseInt("{{ remaining | default(5) }}") || 5;
        const totalTime = 5; // Base para el cálculo del círculo (5 segundos)
        const secondsEl = document.getElementById('seconds');
        const circle = document.getElementById('timer-circle');
        const statusLabel = document.getElementById('status-label');
        const refreshStatus = document.getElementById('refresh-status');
        
        const circumference = 2 * Math.PI * 70;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            circle.style.strokeDashoffset = offset;
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                secondsEl.innerText = "0s";
                setProgress(0);
                statusLabel.innerText = "¡Listo!";
                refreshStatus.style.display = "block";
                
                // Recarga automática al terminar
                setTimeout(() => {
                    window.location.href = window.location.pathname; // Recargar a la misma URL
                }, 800);
                return;
            }

            secondsEl.innerText = timeLeft + "s";
            const percent = (timeLeft / totalTime) * 100;
            setProgress(percent);
            statusLabel.innerText = "Tiempo de espera";
            
            timeLeft--;
            setTimeout(updateTimer, 1000);
        }

        // Iniciar
        updateTimer();
    </script>
</body>
</html>
