<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Interno - UmapyoiBot</title>
    <link rel="icon" type="image/png" href="/static/assets/favicon_web.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-main: #0a0a0c;
            --p-pink: #f582ae;
            --p-pink-soft: rgba(245, 130, 174, 0.15);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(-5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(245, 130, 174, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(245, 130, 174, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 130, 174, 0); }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(245, 130, 174, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(138, 43, 226, 0.08), transparent 25%);
            color: var(--text-main);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 50px 40px;
            max-width: 500px;
            width: 90%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .error-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            border-radius: 2px 2px 0 0;
            opacity: 0.8;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: rgba(239, 68, 68, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            color: #ef4444;
            animation: float 4s ease-in-out infinite;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .icon-wrapper i {
            width: 45px;
            height: 45px;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(to right, #fff, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 10px 0 15px 0;
            color: #fff;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.05rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-home:hover {
            transform: translateY(-3px) scale(1.02);
            background: #fff;
            color: var(--bg-main);
        }

        .btn-home:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="icon-wrapper" style="margin-top: -15px; width: 60px; height: 60px;">
            <i data-lucide="server-crash" style="width: 30px; height: 30px;"></i>
        </div>
        <h1>Error del Servidor</h1>
        <p>Nuestros ingenieros mágicos tropezaron con un cable suelto. Estamos solucionándolo de forma automática, vuelve a intentar más tarde.</p>
        <a href="/" class="btn-home">
            <i data-lucide="home"></i> Volver al Inicio
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
